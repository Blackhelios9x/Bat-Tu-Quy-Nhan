<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bát Tự & Thiên Ất Quý Nhân – Giao diện tươi sáng</title>

<!-- Thư viện lịch Trung Hoa chính xác -->
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>

<!-- Google Fonts: Poppins hiện đại, dễ đọc -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #2c2418;
  min-height: 100vh;
  line-height: 1.5;
  padding: 20px;
}

/* Khung chính */
.wrap {
  max-width: 1000px;
  margin: 0 auto;
  background: rgba(255, 250, 240, 0.85);
  backdrop-filter: blur(2px);
  border-radius: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.05);
  padding: 24px 28px;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 28px;
}
header h1 {
  font-size: 2rem;
  font-weight: 600;
  color: #b8860b;
  letter-spacing: -0.3px;
  margin-bottom: 8px;
}
header p {
  color: #7a5c3a;
  font-size: 0.9rem;
}
.divider {
  width: 80px;
  height: 2px;
  background: #e6c8a0;
  margin: 12px auto 16px;
  border-radius: 2px;
}

/* Card chung */
.card {
  background: rgba(255, 248, 235, 0.96);
  border-radius: 28px;
  padding: 24px 28px;
  margin-bottom: 24px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.02);
  border: 1px solid #ffe6c7;
}

.ctitle {
  font-weight: 600;
  font-size: 1.2rem;
  color: #c47b2e;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ctitle::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e6c8a0;
}

/* Input row */
.irow {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: flex-end;
}
.ig {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ig label {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  color: #aa7a3c;
  letter-spacing: 0.5px;
}
input[type="text"] {
  background: #fffef7;
  border: 1px solid #e6d5b8;
  border-radius: 16px;
  padding: 10px 16px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  color: #2c2418;
  outline: none;
  transition: 0.2s;
}
input[type="text"]:focus {
  border-color: #c47b2e;
  box-shadow: 0 0 0 2px rgba(196,123,46,0.1);
}
input[type="text"].w { width: 180px; }
input[type="text"].n { width: 110px; }
input[type="text"].invalid { border-color: #e07c4c; background: #fff3ef; }

/* Nút chính */
.btn-main {
  display: block;
  width: 260px;
  margin: 20px auto 30px;
  background: #e6b05c;
  border: none;
  padding: 12px 20px;
  border-radius: 40px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 1rem;
  color: #2c1c0a;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.05);
}
.btn-main:hover {
  background: #d99e3e;
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.08);
}

/* Kết quả */
#results { display: none; margin-top: 20px; }

/* Bát tự của tôi */
.my-card {
  background: rgba(255, 242, 224, 0.98);
  border-radius: 28px;
  padding: 24px;
  margin-bottom: 24px;
  text-align: center;
  border: 1px solid #f5dfc0;
}
.my-card h3 {
  font-size: 1rem;
  font-weight: 600;
  color: #b87a2e;
  margin-bottom: 16px;
}
.bz-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.pillar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.plbl {
  font-size: 0.7rem;
  font-weight: 500;
  color: #a07642;
  text-transform: uppercase;
}
.pval {
  background: #fffcf5;
  border: 1px solid #eedbbc;
  border-radius: 20px;
  padding: 8px 16px;
  min-width: 80px;
  text-align: center;
}
.pval .s {
  display: block;
  font-weight: 700;
  font-size: 1rem;
  color: #c17b2e;
}
.pval .b {
  font-size: 0.85rem;
  color: #4a3a28;
}
/* Highlight quý nhân */
.pval.hit-a { border-color: #e6b422; background: #fff3e0; }
.pval.hit-b { border-color: #6fa8dc; background: #eef5ff; }
.pval.hit-ab { border-color: #cf9f4a; background: #fff0db; }

/* Card người */
.pcard {
  background: #fffaf2;
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid #f2e2ce;
}
.pcard-hd {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid #eedbbc;
}
.badge {
  background: #e6c8a0;
  color: #5c401f;
  padding: 4px 12px;
  border-radius: 30px;
  font-size: 0.75rem;
  font-weight: 600;
}

/* So sánh */
.cmp-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
}
@media (max-width: 560px) {
  .cmp-grid { grid-template-columns: 1fr; }
}
.pct-box {
  background: #fff9f0;
  border-radius: 20px;
  padding: 16px;
  text-align: center;
  border: 1px solid #f0e0cc;
}
.pct-lbl {
  font-size: 0.75rem;
  color: #8e6a3c;
  margin-bottom: 8px;
}
.pct-val {
  font-size: 1.8rem;
  font-weight: 700;
  color: #c47b2e;
}
.pct-bar {
  height: 6px;
  background: #eedbbc;
  border-radius: 3px;
  margin: 12px 0 8px;
  overflow: hidden;
}
.pct-fill {
  height: 100%;
  background: #e6b05c;
  border-radius: 3px;
}
.pct-stars {
  font-size: 0.85rem;
  color: #c99f5e;
}
.pct-hits {
  font-size: 0.7rem;
  color: #a07642;
  margin-top: 8px;
}
.sum-line {
  text-align: center;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #eedbbc;
  font-size: 0.8rem;
  color: #7e623e;
}
.sum-line strong { color: #b87a2e; }

.note-card {
  background: #fff5e8;
  border-left: 4px solid #e6b05c;
  border-radius: 16px;
  padding: 12px 16px;
  margin-top: 16px;
  font-size: 0.75rem;
  color: #785e38;
}
.note-card strong { color: #b1621a; }

/* Tùy chọn tháng */
.opt-row {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.opt-row label {
  font-size: 0.8rem;
  color: #5c401f;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.opt-row input {
  accent-color: #e6b05c;
}

/* Nút ảnh nền góc phải */
.bg-ctrl {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}
.btn-sm {
  background: rgba(255,245,230,0.9);
  backdrop-filter: blur(8px);
  border: 1px solid #e6c8a0;
  border-radius: 40px;
  padding: 6px 14px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  color: #b87a2e;
  cursor: pointer;
  transition: 0.2s;
}
.btn-sm:hover {
  background: #fff3e6;
  border-color: #d4a35a;
}

/* Footer */
footer {
  text-align: center;
  margin-top: 24px;
  padding: 16px 0 8px;
  color: #aa8a60;
  font-size: 0.7rem;
  border-top: 1px solid #eedbbc;
}
.errtxt {
  color: #e07c4c;
  font-size: 0.7rem;
  margin-top: 6px;
}
</style>
</head>
<body>

<div class="bg-ctrl">
  <label class="btn-sm" title="Chọn ảnh nền trang (jpg, png, webp)">
    🖼 Ảnh nền
    <input type="file" id="bgInput" accept="image/jpeg,image/png,image/webp" style="display:none">
  </label>
  <button class="btn-sm" id="rmBgBtn" style="display:none">✕ Xóa nền</button>
</div>

<div class="wrap">
  <header>
    <h1>☯ Bát Tự & Thiên Ất Quý Nhân</h1>
    <div class="divider"></div>
    <p>Nhập ngày giờ sinh dương lịch · Chọn cách tính tháng</p>
  </header>

  <!-- Thông tin của bạn -->
  <div class="card">
    <div class="ctitle">⭐ Thông tin của bạn</div>
    <div class="irow">
      <div class="ig">
        <label>Ngày sinh (dd/mm/yyyy)</label>
        <input type="text" id="myDate" class="w" placeholder="VD: 26/10/1992" maxlength="10">
      </div>
      <div class="ig">
        <label>Giờ sinh (hh:mm) — 24h</label>
        <input type="text" id="myTime" class="n" placeholder="00:00" maxlength="5">
      </div>
    </div>
    <div class="opt-row">
      <div class="ig" style="flex-direction:row; gap:12px;">
        <span>📆 Cách tính tháng:</span>
        <label><input type="radio" name="monthMode" value="tiethi"> Theo tiết khí (Bát Tự chuẩn)</label>
        <label><input type="radio" name="monthMode" value="amlich" checked> Theo mồng 1 âm lịch</label>
      </div>
    </div>
    <div class="errtxt" id="myErr"></div>
  </div>

  <!-- Người cần xem -->
  <div class="card">
    <div class="ctitle">👥 Người cần xem (tối đa 5 người)</div>
    <div id="pInputs"></div>
  </div>

  <button class="btn-main" onclick="calculate()">✨ Xem Kết Quả</button>
  <div id="results"></div>

  <footer>
    <p>Bát Tự tính theo tiết khí hoặc mồng 1 âm lịch · Thiên Ất Quý Nhân theo bài thơ cổ</p>
    <p>Chỉ mang tính tham khảo</p>
  </footer>
</div>

<script>
// =====================================================
// HẰNG SỐ — CAN CHI
// =====================================================
const CAN = ['Giáp','Ất','Bính','Đinh','Mậu','Kỷ','Canh','Tân','Nhâm','Quý'];
const CHI = ['Tý','Sửu','Dần','Mão','Thìn','Tỵ','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi'];
const CAN_HAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const CHI_HAN = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

// Bảng Quý Nhân: canIdx -> [chiIdx1, chiIdx2]
const QN = [
  [1, 7],   // Giáp → Sửu, Mùi
  [0, 8],   // Ất → Tý, Thân
  [11, 9],  // Bính → Hợi, Dậu
  [11, 9],  // Đinh → Hợi, Dậu
  [1, 7],   // Mậu → Sửu, Mùi
  [0, 8],   // Kỷ → Tý, Thân
  [1, 7],   // Canh → Sửu, Mùi
  [6, 2],   // Tân → Ngọ, Dần
  [3, 5],   // Nhâm → Mão, Tỵ
  [3, 5],   // Quý → Mão, Tỵ
];

const STARS = ['☆☆☆☆', '★☆☆☆', '★★☆☆', '★★★☆', '★★★★'];
const TRULBL = { year: 'Năm', month: 'Tháng', day: 'Ngày', hour: 'Giờ' };
const ORDER = ['hour', 'day', 'month', 'year'];

// =====================================================
// KHỞI TẠO
// =====================================================
window.addEventListener('DOMContentLoaded', () => {
  const savedBg = localStorage.getItem('battu_bg');
  if (savedBg) {
    applyBg(savedBg);
    document.getElementById('rmBgBtn').style.display = 'flex';
  }

  const cont = document.getElementById('pInputs');
  for (let i = 1; i <= 5; i++) {
    cont.innerHTML += `
      <div class="prow" id="pr${i}">
        <div class="irow">
          <div class="pnum" style="width:30px; height:30px; background:#e6c8a0; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:bold; color:#5c401f;">${i}</div>
          <div class="ig">
            <label>Ngày sinh (dd/mm/yyyy)</label>
            <input type="text" id="p${i}d" class="w" placeholder="Bỏ trống nếu không xem" maxlength="10">
          </div>
          <div class="ig">
            <label>Giờ (hh:mm) — 24h</label>
            <input type="text" id="p${i}t" class="n" placeholder="00:00" maxlength="5">
          </div>
        </div>
        <div class="errtxt" id="p${i}e" style="padding-left:44px"></div>
      </div>`;
  }

  document.getElementById('bgInput').addEventListener('change', uploadBg);
  document.getElementById('rmBgBtn').addEventListener('click', removeBg);
});

function uploadBg(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const MAX = 1920;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const data = c.toDataURL('image/jpeg', 0.8);
      try { localStorage.setItem('battu_bg', data); } catch(_) {}
      applyBg(data);
      document.getElementById('rmBgBtn').style.display = 'flex';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function applyBg(data) {
  document.body.style.backgroundImage = `url(${data})`;
  document.body.style.backgroundSize = 'cover';
  document.body.style.backgroundAttachment = 'fixed';
}

function removeBg() {
  localStorage.removeItem('battu_bg');
  document.body.style.backgroundImage = '';
  document.body.style.background = 'linear-gradient(145deg, #fef9e6 0%, #fff4e0 100%)';
  document.getElementById('rmBgBtn').style.display = 'none';
  document.getElementById('bgInput').value = '';
}

// =====================================================
// PARSE ĐẦU VÀO
// =====================================================
function parseDate(s) {
  if (!s) return null;
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  const d = +m[1], mo = +m[2], y = +m[3];
  if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  if (y < 1900 || y > 2100) return null;
  const dt = new Date(y, mo - 1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== mo - 1 || dt.getDate() !== d) return null;
  return { d, m: mo, y };
}

function parseTime(s) {
  if (!s || !s.trim()) return { h: 0, min: 0 };
  const m = s.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = +m[1], min = +m[2];
  if (h < 0 || h > 23 || min < 0 || min > 59) return null;
  return { h, min };
}

function isLeapMonth(lunar) {
  if (typeof lunar.isLeap === 'function') return lunar.isLeap();
  if (typeof lunar.getLeap === 'function') return lunar.getLeap() === 1;
  const year = lunar.getYear();
  const leapMonth = lunar.getLeapMonth ? lunar.getLeapMonth() : 0;
  const month = lunar.getMonth();
  return leapMonth === month;
}

function getBaZi(y, m, d, h, mi, useLunarMonth) {
  const solar = Solar.fromYmdHms(y, m, d, h, mi, 0);
  const ec = solar.getLunar().getEightChar();
  const year = parseGZ(ec.getYear());
  const day = parseGZ(ec.getDay());
  const hour = parseGZ(ec.getTime());
  
  let month;
  if (useLunarMonth) {
    const lunar = solar.getLunar();
    let lunarMonth = lunar.getMonth();
    const isLeap = isLeapMonth(lunar);
    const yearGanZhi = ec.getYear();
    const yearGan = CAN_HAN.indexOf(yearGanZhi[0]);
    
    if (yearGan !== -1) {
      const startCanMap = {0:2,5:2,1:4,6:4,2:6,7:6,3:8,8:8,4:0,9:0};
      const startCan = startCanMap[yearGan];
      let monthIndex = lunarMonth - 1;
      if (isLeap) monthIndex--;
      if (monthIndex < 0) monthIndex = 0;
      let monthCanIdx = (startCan + monthIndex) % 10;
      let monthChiIdx = (monthIndex + 2) % 12;
      month = { si: monthCanIdx, bi: monthChiIdx, can: CAN[monthCanIdx], chi: CHI[monthChiIdx] };
    } else {
      month = parseGZ(ec.getMonth());
    }
  } else {
    month = parseGZ(ec.getMonth());
  }
  return { year, month, day, hour };
}

function parseGZ(gz) {
  const si = CAN_HAN.indexOf(gz[0]);
  const bi = CHI_HAN.indexOf(gz[1]);
  return { si, bi, can: si>=0 ? CAN[si] : '?', chi: bi>=0 ? CHI[bi] : '?' };
}

function compareQN(myBZ, pBZ) {
  const aHit = [], bHit = [];
  for (const p of ['year', 'month', 'day', 'hour']) {
    if (myBZ[p].si >= 0 && QN[myBZ[p].si].includes(pBZ[p].bi)) aHit.push(p);
    if (pBZ[p].si >= 0 && QN[pBZ[p].si].includes(myBZ[p].bi)) bHit.push(p);
  }
  return {
    aCount: aHit.length, bCount: bHit.length, aHit, bHit,
    aPercent: aHit.length * 25, bPercent: bHit.length * 25,
  };
}

function renderPillars(bz, hitA = [], hitB = []) {
  return ORDER.map(p => {
    const inA = hitA.includes(p);
    const inB = hitB.includes(p);
    let cls = '';
    if (inA && inB) cls = 'hit-ab';
    else if (inA) cls = 'hit-a';
    else if (inB) cls = 'hit-b';
    return `<div class="pillar"><span class="plbl">${TRULBL[p]}</span><div class="pval ${cls}"><span class="s">${bz[p].can}</span><span class="b">${bz[p].chi}</span></div></div>`;
  }).join('');
}

function baziStr(bz) {
  return ORDER.map(p => `${bz[p].can} ${bz[p].chi}`).join(', ');
}

function renderPct(pct, count, label, hits) {
  const hitStr = hits.length ? `<div class="pct-hits">Khớp tại trụ: ${hits.map(h=>TRULBL[h]).join(', ')}</div>` : '';
  return `<div class="pct-box"><div class="pct-lbl">${label}</div><div class="pct-val">${pct}%</div><div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div><div class="pct-stars">${STARS[count]}</div>${hitStr}</div>`;
}

function calculate() {
  if (typeof Solar === 'undefined') {
    alert('⚠ Chưa tải được thư viện lịch. Vui lòng kiểm tra kết nối.');
    return;
  }

  document.querySelectorAll('.errtxt').forEach(e => e.textContent = '');
  document.querySelectorAll('input[type=text]').forEach(i => i.classList.remove('invalid'));

  const useLunarMonth = document.querySelector('input[name="monthMode"]:checked').value === 'amlich';
  const myDate = parseDate(document.getElementById('myDate').value);
  const myTime = parseTime(document.getElementById('myTime').value);
  let hasErr = false;
  if (!myDate) {
    document.getElementById('myDate').classList.add('invalid');
    document.getElementById('myErr').textContent = '⚠ Ngày không hợp lệ — dd/mm/yyyy';
    hasErr = true;
  }
  if (!myTime) {
    document.getElementById('myTime').classList.add('invalid');
    document.getElementById('myErr').textContent += (hasErr ? '   ' : '') + '⚠ Giờ không hợp lệ — hh:mm';
    hasErr = true;
  }
  if (hasErr) { document.getElementById('results').style.display = 'none'; return; }

  let myBZ;
  try {
    myBZ = getBaZi(myDate.y, myDate.m, myDate.d, myTime.h, myTime.min, useLunarMonth);
  } catch (err) {
    document.getElementById('myErr').textContent = '⚠ Lỗi tính bát tự: ' + err.message;
    return;
  }

  const people = [];
  for (let i = 1; i <= 5; i++) {
    const dRaw = document.getElementById(`p${i}d`).value.trim();
    const tRaw = document.getElementById(`p${i}t`).value.trim();
    if (!dRaw) continue;
    const pd = parseDate(dRaw);
    if (!pd) {
      document.getElementById(`p${i}d`).classList.add('invalid');
      document.getElementById(`p${i}e`).textContent = '⚠ Ngày không hợp lệ (dd/mm/yyyy)';
      continue;
    }
    const pt = parseTime(tRaw);
    if (tRaw && !pt) {
      document.getElementById(`p${i}t`).classList.add('invalid');
      document.getElementById(`p${i}e`).textContent = '⚠ Giờ không hợp lệ (hh:mm)';
      continue;
    }
    let pBZ;
    try {
      pBZ = getBaZi(pd.y, pd.m, pd.d, pt ? pt.h : 0, pt ? pt.min : 0, useLunarMonth);
    } catch (err) {
      document.getElementById(`p${i}e`).textContent = '⚠ Lỗi: ' + err.message;
      continue;
    }
    people.push({ idx: i, bz: pBZ });
  }

  let html = '';
  html += `<div class="my-card"><h3>⭐ Bát Tự của bạn</h3><div class="bz-row">${renderPillars(myBZ)}</div><div style="font-size:0.8rem; color:#a07642;">${baziStr(myBZ)}</div><div class="note-card"><strong>Thiên Ất Quý Nhân:</strong> Giáp/Mậu/Canh→Sửu,Mùi · Ất/Kỷ→Tý,Thân · Bính/Đinh→Hợi,Dậu · Tân→Ngọ,Dần · Nhâm/Quý→Mão,Tỵ<br><span style="font-size:0.7rem;">🟡 Vàng = bạn là quý nhân của người · 🔵 Xanh = người là quý nhân của bạn · 🌕 Vàng đậm = cả hai chiều</span><br><span style="font-size:0.65rem;">📆 Tháng tính theo: ${useLunarMonth ? 'mồng 1 âm lịch' : 'tiết khí'}</span></div></div>`;

  if (people.length === 0) {
    html += `<div class="card" style="text-align:center; color:#a07642;">Chưa có thông tin người cần xem.<br>Vui lòng nhập ít nhất một người.</div>`;
  } else {
    for (const p of people) {
      const cmp = compareQN(myBZ, p.bz);
      const total = cmp.aCount + cmp.bCount;
      html += `<div class="pcard"><div class="pcard-hd"><span class="badge">Người ${p.idx}</span><span style="color:#b87a2e; font-size:0.85rem;">${baziStr(p.bz)}</span></div><div class="bz-row" style="margin-bottom:12px;">${renderPillars(p.bz, cmp.bHit, cmp.aHit)}</div><div class="cmp-grid">${renderPct(cmp.aPercent, cmp.aCount, '🌟 Quý nhân của <strong>bạn</strong><br>đối với người này', cmp.aHit)}${renderPct(cmp.bPercent, cmp.bCount, '🌟 Quý nhân của người này<br>đối với <strong>bạn</strong>', cmp.bHit)}</div><div class="sum-line">Cặp này có <strong>${total} chữ quý nhân</strong> &nbsp;·&nbsp; Bạn → Người: <strong>${cmp.aCount}</strong> (${cmp.aPercent}%) &nbsp;·&nbsp; Người → Bạn: <strong>${cmp.bCount}</strong> (${cmp.bPercent}%)</div></div>`;
    }
  }

  const rd = document.getElementById('results');
  rd.innerHTML = html;
  rd.style.display = 'block';
  setTimeout(() => rd.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
}
</script>
</body>
</html>
