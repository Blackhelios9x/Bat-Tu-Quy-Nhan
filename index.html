<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Bát Tự · Tử Vi · Quý Nhân</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        /* ========== BIẾN MÀU – DÙNG CHUNG ========== */
        :root {
            --primary:     #a67c4e;
            --primary-l:   #c8a87c;
            --primary-d:   #5e3e22;
            --accent:      #d4a96a;
            --bg:          #fbf7f0;
            --card:        #ffffffdd;
            --card2:       #fff9f2ee;
            --bor:         #e3d6c5;
            --bor-h:       #c9aa8b;
            --text:        #1f150c;
            --text-light:  #4d3a28;
            --muted:       #7a6048;
            --muted2:      #9c8268;
            --in-bg:       #fefcf8;
            --err:         #b33f3d;
            --shadow:      0 8px 20px rgba(0,0,0,.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: rgba(255,250,240,.3); z-index: 0; pointer-events: none;
        }
        .wrap {
            position: relative; z-index: 1;
            max-width: 1050px; margin: 0 auto; padding: 20px 16px 50px;
        }

        header { text-align: center; padding: 40px 16px 26px; }
        .h-icon { font-size: 48px; margin-bottom: 12px; }
        header h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); color: var(--primary-d); font-weight: 700; }
        header p { color: var(--muted); font-style: italic; font-size: .9rem; }
        .divider { width: 120px; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); margin: 14px auto; }

        /* ========== TAB BAR ========== */
        .tab-bar { display: flex; margin-bottom: 26px; border-bottom: 1px solid var(--bor); }
        .tab-btn {
            flex: 1; padding: 14px 10px; background: transparent;
            border: none; border-bottom: 3px solid transparent;
            color: var(--text-light); font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .tab-btn:hover { color: var(--primary); background: rgba(166,124,78,.05); }
        .tab-btn.active { color: var(--primary-d); border-bottom-color: var(--primary-d); background: rgba(166,124,78,.08); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        footer { text-align: center; padding: 30px; color: var(--muted); }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <div class="h-icon">☯</div>
        <h1>Bát Tự · Tử Vi · Quý Nhân</h1>
        <div class="divider"></div>
        <p>Dụng Thần · Lá Số Tử Vi · Thiên Ất Quý Nhân</p>
    </header>

    <!-- ========== TAB BAR ========== -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="dt" onclick="switchTab('dt')">🔥 Dụng Thần</button>
        <button class="tab-btn" data-tab="ls" onclick="switchTab('ls')">🌿 Lá Số Tử Vi</button>
        <button class="tab-btn" data-tab="qn" onclick="switchTab('qn')">✨ Quý Nhân</button>
    </div>

    <!-- ========== CÁC MODULE ========== -->
    <bat-tu-module class="tab-panel active" data-tab="dt"></bat-tu-module>
    <tu-vi-module class="tab-panel" data-tab="ls"></tu-vi-module>
    <quy-nhan-module class="tab-panel" data-tab="qn"></quy-nhan-module>


</div>

<script type="module">
    import './modules/bat-tu.js';
    import './modules/tu-vi.js';
    import './modules/quy-nhan.js';

    // Điều khiển chuyển tab
    window.switchTab = function(id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const activeBtn = document.querySelector(`.tab-btn[data-tab="${id}"]`);
        const activePanel = document.querySelector(`[data-tab="${id}"].tab-panel`);
        if (activeBtn) activeBtn.classList.add('active');
        if (activePanel) activePanel.classList.add('active');
    };
</script>
</body>
</html>
